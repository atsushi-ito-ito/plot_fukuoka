<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>福岡市 新築マンションMAP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont,
        "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
      background-color: #e5eaec;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .leaflet-div-icon {
      background: transparent !important;
      border: none !important;
    }

    .property-card {
      background: #ffffff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.25);
      box-sizing: border-box;
    }

    .property-card-full {
      padding: 8px 10px;
      min-width: 180px;
      max-width: 240px;
      font-size: 11px;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .property-card-inner {
      flex: 1;
      min-width: 0;
    }
    .property-card-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .highlight {
      color: #f97316;
      font-weight: 700;
      font-size: 13px;
    }

    .tsubo-bar {
      width: 4px;
      height: 52px;
      border-radius: 999px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .property-card-compact {
      padding: 4px 10px;
      min-width: 90px;
      max-width: 150px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #f97316;
    }
    .tsubo-bar-compact {
      width: 4px;
      height: 16px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .filter-toggle {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 9000;
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      background: #020617;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.45);
      cursor: pointer;
    }
    .filter-toggle.hidden {
      display: none;
    }

    #filter-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 9400;
    }
    #filter-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #filter-panel {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      max-width: 420px;
      width: 100%;
      background: #f9fafb;
      box-shadow: 4px 0 20px rgba(15, 23, 42, 0.4);
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s ease-out, opacity 0.25s ease-out;
      z-index: 9500;
      display: flex;
      flex-direction: column;
    }
    #filter-panel.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .filter-panel-inner {
      padding: 16px 16px 24px;
      overflow-y: auto;
      height: 100%;
      box-sizing: border-box;
    }

    .filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .app-title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .filter-close {
      border: none;
      background: transparent;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: #6b7280;
    }

    .filter-section {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      padding: 16px 16px 18px;
      margin-top: 16px;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
    }

    .filter-section-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 8px 16px;
      background: #ffffff;
      font-size: 14px;
      cursor: pointer;
      color: #111827;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .chip:hover {
      background: #f1f5f9;
    }

    .chip-active {
      background: #020617;
      color: #ffffff !important;
      border-color: #020617;
    }

    @media (min-width: 768px) {
      #filter-panel {
        max-width: 420px;
        width: 360px;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <button id="filter-toggle" class="filter-toggle">絞り込み</button>
  <div id="filter-overlay"></div>

  <aside id="filter-panel">
    <div class="filter-panel-inner">
      <div class="filter-header">
        <h1 class="app-title">福岡市 新築マンションMAP</h1>
        <button id="filter-close" class="filter-close" aria-label="閉じる">×</button>
      </div>

      <!-- エリア（ward を流用） -->
      <section class="filter-section">
        <h2 class="filter-section-title">エリア</h2>
        <div class="chip-row" id="chip-row-area">
          <button class="chip chip-active" data-group="area" data-filter="all">全</button>
          <button class="chip" data-group="area" data-filter="中央区">中央区</button>
          <button class="chip" data-group="area" data-filter="南区">南区</button>
          <button class="chip" data-group="area" data-filter="東区">東区</button>
          <button class="chip" data-group="area" data-filter="早良区">早良区</button>
          <button class="chip" data-group="area" data-filter="城南区">城南区</button>
          <button class="chip" data-group="area" data-filter="西区">西区</button>
        </div>
      </section>

      <!-- 坪単価レンジ -->
      <section class="filter-section">
        <h2 class="filter-section-title">坪単価レンジ</h2>
        <div class="chip-row" id="chip-row-tsubo">
          <button class="chip chip-active" data-group="tsubo" data-filter="all">全</button>
          <button class="chip" data-group="tsubo" data-filter="0-200">〜200万円</button>
          <button class="chip" data-group="tsubo" data-filter="200-250">200〜250万円</button>
          <button class="chip" data-group="tsubo" data-filter="250-300">250〜300万円</button>
          <button class="chip" data-group="tsubo" data-filter="300-350">300〜350万円</button>
          <button class="chip" data-group="tsubo" data-filter="350+">350万円〜</button>
          <button class="chip" data-group="tsubo" data-filter="unknown">坪単価不明</button>
        </div>
      </section>

      <!-- 戸数規模 -->
      <section class="filter-section">
        <h2 class="filter-section-title">戸数規模</h2>
        <div class="chip-row" id="chip-row-units">
          <button class="chip chip-active" data-group="units" data-filter="all">全</button>
          <button class="chip" data-group="units" data-filter="0-50">〜50戸</button>
          <button class="chip" data-group="units" data-filter="51-100">51〜100戸</button>
          <button class="chip" data-group="units" data-filter="101+">101戸〜</button>
        </div>
      </section>

      <!-- 最寄駅までの徒歩分数 -->
      <section class="filter-section">
        <h2 class="filter-section-title">最寄駅までの徒歩分数</h2>
        <div class="chip-row" id="chip-row-walk">
          <button class="chip chip-active" data-group="walk" data-filter="all">全</button>
          <button class="chip" data-group="walk" data-filter="0-5">〜5分</button>
          <button class="chip" data-group="walk" data-filter="6-10">5〜10分</button>
          <button class="chip" data-group="walk" data-filter="11-15">10〜15分</button>
          <button class="chip" data-group="walk" data-filter="16+">15分〜</button>
        </div>
      </section>

      <!-- 価格（70㎡換算） -->
      <section class="filter-section">
        <h2 class="filter-section-title">価格（70㎡換算）</h2>
        <div class="chip-row" id="chip-row-price">
          <button class="chip chip-active" data-group="price" data-filter="all">全</button>
          <button class="chip" data-group="price" data-filter="0-5000">〜5,000</button>
          <button class="chip" data-group="price" data-filter="0-6000">〜6,000</button>
          <button class="chip" data-group="price" data-filter="0-7000">〜7,000</button>
          <button class="chip" data-group="price" data-filter="0-8000">〜8,000</button>
          <button class="chip" data-group="price" data-filter="0-9000">〜9,000</button>
          <button class="chip" data-group="price" data-filter="0-10000">〜10,000</button>
          <button class="chip" data-group="price" data-filter="10000-">10,000〜</button>
        </div>
      </section>

    </div>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ==========================
    //  Sheets(API)から物件データを取得
    // ==========================
    let properties = [];

    async function loadPropertiesFromApi() {
      const res = await fetch("/api/properties", { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to fetch /api/properties");
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    }

    // セルに "..." が入っている場合の見た目対策（任意）
    function stripOuterQuotes(v) {
      const s = String(v ?? "");
      return s.replace(/^"+|"+$/g, "");
    }

    /* ========= 地図初期化 ========= */
    const map = L.map("map").setView([33.59, 130.40], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
    }).addTo(map);

    /* ========= Zoom モード判定 ========= */
    function getModeFromZoom() {
      const z = map.getZoom();
      return z >= 15 ? "full" : "compact";
    }

    /* ========= 坪単価の数値・色判定 ========= */
    function parseTsuboValue(tsubo) {
      if (!tsubo) return null;
      const m = String(tsubo).match(/(\d+)/);
      return m ? parseInt(m[1], 10) : null;
    }

    function getTsuboColor(tsubo) {
      const v = parseTsuboValue(tsubo);
      if (v === null || Number.isNaN(v)) return "#6b7280";
      if (v <= 200) return "#22c55e";
      if (v <= 300) return "#f97316";
      return "#ef4444";
    }

    function get70mPriceLabel(tsubo) {
      const v = parseTsuboValue(tsubo);
      if (v === null || Number.isNaN(v)) return "";
      const tsuboFor70 = 21.175;
      const priceMan = Math.round(v * tsuboFor70);
      const formatted = priceMan.toLocaleString("ja-JP");
      return `約${formatted}万円`;
    }

    function get70mPriceValue(tsubo) {
      const v = parseTsuboValue(tsubo);
      if (v === null || Number.isNaN(v)) return null;
      const tsuboFor70 = 21.175;
      return Math.round(v * tsuboFor70);
    }

    /* ========= 戸数の数値判定 ========= */
    function parseUnitsCount(units) {
      if (!units) return null;
      const m = String(units).match(/(\d+)/);
      return m ? parseInt(m[1], 10) : null;
    }

    /* ========= カードHTML生成 ========= */
    function createCardHTML(p, mode) {
      // 見た目用に " を外す（任意）
      const name = stripOuterQuotes(p.name);
      const tsubo = stripOuterQuotes(p.tsubo);
      const units = stripOuterQuotes(p.units);
      const developer = stripOuterQuotes(p.developer);
      const sale = stripOuterQuotes(p.sale);
      const completion = stripOuterQuotes(p.completion);
      const walk = stripOuterQuotes(p.walk);

      const tsuboColor   = getTsuboColor(tsubo);
      const price70Label = get70mPriceLabel(tsubo);

      if (mode === "full") {
        return `
          <div class="property-card property-card-full">
            <div class="tsubo-bar" style="background-color:${tsuboColor};"></div>
            <div class="property-card-inner">
              <div class="property-card-title">${name}</div>
              ${tsubo ? `<div class="highlight">${tsubo}</div>` : ""}
              ${price70Label ? `<div>${price70Label}</div>` : ""}
              ${units ? `<div>${units}</div>` : ""}
              ${developer ? `<div>${developer}</div>` : ""}
              ${sale ? `<div>販売：${sale}</div>` : ""}
              ${completion ? `<div>竣工：${completion}</div>` : ""}
              ${walk ? `<div>最寄駅まで徒歩：${walk}</div>` : ""}
            </div>
          </div>
        `;
      } else {
        const label = price70Label ? price70Label : (tsubo ? tsubo : "－");

        return `
          <div class="property-card property-card-compact">
            <div class="tsubo-bar-compact" style="background-color:${tsuboColor};"></div>
            <span>${label}</span>
          </div>
        `;
      }
    }

    function createCardIcon(p, mode) {
      const html = createCardHTML(p, mode);
      if (mode === "full") {
        return L.divIcon({
          className: "property-card-wrapper",
          html,
          iconSize: [240, 100],
          iconAnchor: [120, 110],
        });
      } else {
        return L.divIcon({
          className: "property-card-wrapper",
          html,
          iconSize: [150, 40],
          iconAnchor: [75, 44],
        });
      }
    }

    /* ========= プロット管理 ========= */
    let rendered = [];

    function clearRendered() {
      rendered.forEach(obj => {
        if (obj.dot)  map.removeLayer(obj.dot);
        if (obj.card) map.removeLayer(obj.card);
        if (obj.line) map.removeLayer(obj.line);
      });
      rendered = [];
    }

    function getCardOffset(index, mode) {
      if (mode === "compact") return { lat: 0, lng: 0 };
      const patterns = [
        { lat: 0.0020, lng: 0 },
        { lat: 0.0016, lng: 0.0016 },
        { lat: 0.0016, lng: -0.0016 },
        { lat: 0.0024, lng: 0.0010 },
        { lat: 0.0024, lng: -0.0010 },
      ];
      return patterns[index % patterns.length];
    }

    /* ========= フィルタ取得 ========= */
    function getActiveFilters(group) {
      const chips = document.querySelectorAll(`.chip[data-group="${group}"].chip-active`);
      const values = Array.from(chips).map(c => c.dataset.filter);
      if (values.length === 0 || values.includes("all")) return ["all"];
      return values;
    }

    /* ========= 各軸のマッチ判定 ========= */
    function matchTsuboFilter(p, filters) {
      if (!filters || filters.includes("all")) return true;

      const v = parseTsuboValue(p.tsubo);
      const isUnknown = (v === null || Number.isNaN(v));

      for (const f of filters) {
        if (f === "unknown") {
          if (isUnknown) return true;
          continue;
        }
        if (isUnknown) continue;

        if (f === "0-200"   && v < 200) return true;
        if (f === "200-250" && v >= 200 && v < 250) return true;
        if (f === "250-300" && v >= 250 && v < 300) return true;
        if (f === "300-350" && v >= 300 && v < 350) return true;
        if (f === "350+"    && v >= 350) return true;
      }
      return false;
    }

    function matchPriceFilter(p, filters) {
      if (!filters || filters.includes("all")) return true;

      const price = get70mPriceValue(p.tsubo);
      if (price === null) return false;

      for (const f of filters) {
        if (f === "all") return true;

        if (f.includes("-")) {
          const [minStr, maxStr] = f.split("-");
          const min = minStr ? parseInt(minStr, 10) : null;
          const max = maxStr ? parseInt(maxStr, 10) : null;

          if (min !== null && max !== null) {
            if (price >= min && price <= max) return true;
          } else if (min === null && max !== null) {
            if (price <= max) return true;
          } else if (min !== null && max === null) {
            if (price >= min) return true;
          }
        }
      }
      return false;
    }

    function parseWalkMinutes(walk) {
      if (walk === undefined || walk === null) return null;
      const m = String(walk).match(/(\d+)/);
      return m ? parseInt(m[1], 10) : null;
    }

    function matchWalkFilter(p, filters) {
      if (!filters || filters.includes("all")) return true;

      const v = parseWalkMinutes(p.walk);
      if (v === null || Number.isNaN(v)) return false;

      for (const f of filters) {
        if (f === "0-5"   && v <= 5) return true;
        if (f === "6-10"  && v >= 6  && v <= 10) return true;
        if (f === "11-15" && v >= 11 && v <= 15) return true;
        if (f === "16+"   && v >= 16) return true;
      }
      return false;
    }

    function matchAreaFilter(p, filters) {
      if (!filters || filters.includes("all")) return true;
      const w = p.ward;
      if (!w) return false;
      return filters.includes(w);
    }

    function matchUnitsFilter(p, filters) {
      if (!filters || filters.includes("all")) return true;
      const v = parseUnitsCount(p.units);
      if (v === null || Number.isNaN(v)) return false;

      for (const f of filters) {
        if (f === "0-50"   && v <= 50) return true;
        if (f === "51-100" && v >= 51 && v <= 100) return true;
        if (f === "101+"   && v >= 101) return true;
      }
      return false;
    }

    /* ========= プロット描画 ========= */
    let initialized = false;

    function plotAll() {
      if (!Array.isArray(properties)) return;

      clearRendered();
      const mode = getModeFromZoom();

      const areaFilters  = getActiveFilters("area");
      const tsuboFilters = getActiveFilters("tsubo");
      const walkFilters  = getActiveFilters("walk");
      const priceFilters = getActiveFilters("price");
      const unitsFilters = getActiveFilters("units");

      properties.forEach((p, index) => {
        // ✅ null/undefined を弾く（0判定じゃない）
        if (p.lat == null || p.lng == null) return;

        if (!matchAreaFilter(p, areaFilters)) return;
        if (!matchTsuboFilter(p, tsuboFilters)) return;
        if (!matchUnitsFilter(p, unitsFilters)) return;
        if (!matchWalkFilter(p, walkFilters)) return;
        if (!matchPriceFilter(p, priceFilters)) return;

        const base = [p.lat, p.lng];

        const dot = L.circleMarker(base, {
          radius: 4,
          color: "#2563eb",
          fillColor: "#2563eb",
          weight: 2,
          fillOpacity: 1,
        }).addTo(map);

        const offset = getCardOffset(index, mode);
        const cardPos = [p.lat + offset.lat, p.lng + offset.lng];

        const cardMarker = L.marker(cardPos, {
          icon: createCardIcon(p, mode),
          draggable: mode === "full",
        }).addTo(map);

        const line = L.polyline([base, cardPos], {
          color: "#2563eb",
          weight: 2.5,
        }).addTo(map);

        if (mode === "full") {
          cardMarker.on("drag", (e) => {
            const newPos = e.target.getLatLng();
            line.setLatLngs([base, newPos]);
          });
        }

        rendered.push({ dot, card: cardMarker, line });
      });
    }

    // zoom時は、ロード前でも呼ばれるのでガードしつつ登録
    map.on("zoomend", plotAll);

    // ==========================
    //   チップクリックイベント
    // ==========================
    document.querySelectorAll("#filter-panel .chip").forEach(btn => {
      btn.addEventListener("click", () => {
        const group = btn.dataset.group;
        const value = btn.dataset.filter;
        const chips = document.querySelectorAll(`.chip[data-group="${group}"]`);

        if (value === "all") {
          chips.forEach(c => {
            c.classList.toggle("chip-active", c.dataset.filter === "all");
          });
        } else {
          btn.classList.toggle("chip-active");

          const hasNonAllActive = Array.from(chips).some(c =>
            c.dataset.filter !== "all" && c.classList.contains("chip-active")
          );
          const allChip = Array.from(chips).find(c => c.dataset.filter === "all");

          if (hasNonAllActive) {
            if (allChip) allChip.classList.remove("chip-active");
          } else {
            chips.forEach(c => {
              c.classList.toggle("chip-active", c.dataset.filter === "all");
            });
          }
        }

        plotAll();
      });
    });

    // ==========================
    //   絞り込みパネル開閉
    // ==========================
    const filterPanel  = document.getElementById("filter-panel");
    const filterToggle = document.getElementById("filter-toggle");
    const filterClose  = document.getElementById("filter-close");
    const filterOverlay = document.getElementById("filter-overlay");

    function openFilter() {
      filterPanel.classList.add("open");
      filterOverlay.classList.add("show");
      filterToggle.classList.add("hidden");
    }
    function closeFilter() {
      filterPanel.classList.remove("open");
      filterOverlay.classList.remove("show");
      filterToggle.classList.remove("hidden");
    }

    filterToggle.addEventListener("click", openFilter);
    filterClose.addEventListener("click", closeFilter);
    filterOverlay.addEventListener("click", closeFilter);

    // ==========================
    //  初回ロード：API読み込み後に描画
    // ==========================
    (async () => {
      try {
        properties = await loadPropertiesFromApi();
        plotAll();
      } catch (e) {
        console.error(e);
        alert("物件データの読み込みに失敗しました。/api/properties を確認してください。");
      }
    })();
  </script>
</body>
</html>
